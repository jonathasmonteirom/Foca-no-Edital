version: '3.8'

services:
  app_node:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db  
      - ./uploads:/app/uploads 
    env_file:
      - .env  
    depends_on:
      - api_python

  api_python:
    build: ./python_api
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads  
    env_file:
      - ./python_api/.env